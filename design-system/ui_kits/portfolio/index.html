<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaige Gao — Portfolio</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--color-bg);
  color: var(--color-fg-primary);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
@keyframes shimmer { 0%,100%{background-position:0% center} 50%{background-position:200% center} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
@keyframes skillFill { from{width:0%} to{width:var(--target)} }
@keyframes float { 0%,100%{transform:translateY(0)rotate(0deg)} 33%{transform:translateY(-20px)rotate(2deg)} 66%{transform:translateY(10px)rotate(-2deg)} }
@keyframes pulseGlow { 0%,100%{opacity:.4;filter:blur(80px)} 50%{opacity:.7;filter:blur(100px)} }
@keyframes scrollBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(12px)} }
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#f0ebe4}
::-webkit-scrollbar-thumb{background:#3b82f6;border-radius:3px}
::selection{background:rgba(59,130,246,.2);color:#1a1a1a}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Navbar.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="About.jsx"></script>
<script type="text/babel" src="Projects.jsx"></script>
<script type="text/babel" src="Skills.jsx"></script>
<script type="text/babel" src="Contact.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function App() {
  return (
    <div style={{minHeight:'100vh', background:'var(--color-bg)'}}>
      <KGNavbar />
      <main>
        <KGHero />
        <KGAbout />
        <KGProjects />
        <KGSkills />
        <KGContact />
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
