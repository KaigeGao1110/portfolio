<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:var(--color-bg); font-family:var(--font-sans); padding:20px; }
  h4 { font-size:10px; font-weight:600; letter-spacing:0.15em; text-transform:uppercase; color:#6b7280; margin:0 0 8px; }
  .logo-row { display:flex; gap:16px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
  .logo-mark { width:48px;height:48px;border-radius:10px;background:#3b82f6;display:flex;align-items:center;justify-content:center; }
  .logo-mark span { font-size:18px;font-weight:800;color:white;letter-spacing:2px; }
  .logo-text { font-size:18px;font-weight:800;letter-spacing:0.12em;color:#3b82f6; }
  .logo-dark { background:#1a1a1a; border-radius:10px; padding: 8px 16px; }
  .logo-dark span { font-size:18px;font-weight:800;letter-spacing:0.12em;color:#3b82f6; }
  .skill-row { margin-bottom:10px; }
  .skill-header { display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px; }
  .skill-name { font-weight:500;color:#374151; }
  .skill-val { font-weight:600;color:#3b82f6; }
  .skill-track { height:6px;background:#f3f4f6;border-radius:9999px;overflow:hidden; }
  .skill-fill { height:100%;border-radius:9999px;background:linear-gradient(to right,#3b82f6,#60a5fa); }
  .icon-grid { display:flex;gap:8px;flex-wrap:wrap; }
  .icon-box { width:36px;height:36px;border-radius:10px;background:#eff6ff;border:1px solid #dbeafe;display:flex;align-items:center;justify-content:center; }
  svg { color:#3b82f6; }
</style></head><body>
<h4>Logo / Monogram</h4>
<div class="logo-row">
  <div class="logo-mark"><span>KG</span></div>
  <div class="logo-text">KG</div>
  <div class="logo-dark"><span>KG</span></div>
  <img src="../assets/logo-kg.svg" width="48" height="48" alt="KG logo"/>
</div>
<h4>Lucide Icon Usage (stroke 1.5, 16–20px, blue)</h4>
<div class="icon-grid" style="margin-bottom:14px">
  <!-- ArrowUpRight -->
  <div class="icon-box"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M7 7h10v10"/></svg></div>
  <!-- ExternalLink -->
  <div class="icon-box"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></div>
  <!-- Mail -->
  <div class="icon-box"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 7L2 7"/></svg></div>
  <!-- MapPin -->
  <div class="icon-box"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
</div>
<h4>Skill Bar</h4>
<div style="background:white;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:14px 16px;">
  <div class="skill-row"><div class="skill-header"><span class="skill-name">Multi-Agent Orchestration</span><span class="skill-val">95%</span></div><div class="skill-track"><div class="skill-fill" style="width:95%"></div></div></div>
  <div class="skill-row"><div class="skill-header"><span class="skill-name">LLM Integration & Prompting</span><span class="skill-val">92%</span></div><div class="skill-track"><div class="skill-fill" style="width:92%"></div></div></div>
  <div class="skill-row"><div class="skill-header"><span class="skill-name">GCP (Cloud Run, BigQuery)</span><span class="skill-val">88%</span></div><div class="skill-track"><div class="skill-fill" style="width:88%"></div></div></div>
</div>
</body></html>
