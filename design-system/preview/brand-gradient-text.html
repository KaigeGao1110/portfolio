<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:var(--color-bg); font-family:var(--font-sans); padding:20px; }
  h4 { font-size:10px; font-weight:600; letter-spacing:0.15em; text-transform:uppercase; color:#6b7280; margin:0 0 8px; }
  .hero-name { font-size:clamp(2rem,7vw,4.5rem); font-weight:800; line-height:1.05; }
  .section-h { font-size:clamp(1.5rem,4vw,2.5rem); font-weight:700; line-height:1.1; }
  .eyebrow-demo { font-size:13px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#3b82f6;margin-bottom:8px; }
  .grid-demo { display:inline-block;padding:16px;border-radius:10px;background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);background-size:24px 24px;margin-bottom:12px; }
</style></head><body>
<h4>Gradient Text — Shimmer Animation</h4>
<div class="grid-demo">
  <div class="hero-name kg-gradient-text">Hi, I am Kaige Gao</div>
</div>
<div class="section-h kg-gradient-text" style="margin-bottom:12px">Featured Projects</div>
<div class="section-h kg-gradient-text" style="margin-bottom:16px">Skills & Stack</div>
<h4>Eyebrow + Heading Pattern</h4>
<div style="margin-bottom:12px">
  <div class="eyebrow-demo">Portfolio</div>
  <div class="section-h kg-gradient-text">Featured Projects</div>
</div>
<h4>Cyber Grid Background</h4>
<div class="kg-cyber-grid" style="border-radius:10px;padding:16px;border:1px solid rgba(0,0,0,0.06)">
  <div style="font-size:13px;font-weight:500;color:#1a1a1a;">Faint blue grid — hero background only</div>
  <div style="font-size:11px;color:#6b7280;margin-top:4px;">rgba(59,130,246,0.04) lines at ~40px intervals</div>
</div>
</body></html>
