<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:var(--color-bg); font-family:var(--font-sans); padding:20px; }
  h4 { font-size:10px; font-weight:600; letter-spacing:0.15em; text-transform:uppercase; color:#6b7280; margin:0 0 8px; }
  .nav { display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-radius:12px;margin-bottom:12px; }
  .nav.transparent { background:transparent;border:1px dashed rgba(0,0,0,0.1); }
  .nav.scrolled { background:rgba(255,255,255,0.80);backdrop-filter:blur(12px);border:1px solid #e5e7eb;box-shadow:0 1px 2px rgba(0,0,0,0.04); }
  .logo { font-size:16px;font-weight:800;letter-spacing:0.12em;color:#3b82f6; }
  .links { display:flex;gap:24px; }
  .links a { font-size:13px;font-weight:500;color:#6b7280;text-decoration:none;letter-spacing:0.04em; }
  .links a.active { color:#3b82f6; }
  .cta { font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;background:#eff6ff;color:#3b82f6;border:1px solid #dbeafe;text-decoration:none; }
  .label { font-size:10px;color:#6b7280;margin-bottom:8px;padding-left:4px; }
</style></head><body>
<div class="label">Transparent (top of page)</div>
<div class="nav transparent">
  <div></div>
  <div class="links">
    <a href="#">About</a>
    <a href="#">Projects</a>
    <a href="#">Skills</a>
    <a href="#" class="active">Contact</a>
  </div>
  <a class="cta" href="#">Hire Me</a>
</div>
<div class="label">Scrolled — glass effect</div>
<div class="nav scrolled">
  <div></div>
  <div class="links">
    <a href="#">About</a>
    <a href="#" class="active">Projects</a>
    <a href="#">Skills</a>
    <a href="#">Contact</a>
  </div>
  <a class="cta" href="#">Hire Me</a>
</div>
</body></html>
