<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .swatch { border-radius: 10px; overflow: hidden; border: 1px solid rgba(0,0,0,0.07); }
  .color { height: 56px; }
  .label { padding: 6px 10px; background: white; }
  .name { font-size: 11px; font-weight: 600; color: #1a1a1a; }
  .val  { font-size: 10px; color: #6b7280; font-family: monospace; }
  .row { display:flex; gap:10px; margin-bottom:10px; }
  .wide { flex:1; border-radius:10px; height:48px; border:1px solid rgba(0,0,0,0.07); display:flex; align-items:center; padding:0 12px; gap:8px; }
  .wide .dot { width:20px;height:20px;border-radius:50%; flex-shrink:0; }
  .wide .info .name { font-size:11px; font-weight:600; color:#1a1a1a; display:block; }
  .wide .info .val { font-size:10px; color:#6b7280; font-family:monospace; }
  h4 { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #6b7280; margin: 14px 0 6px; }
</style></head><body>
<h4>Background</h4>
<div class="row">
  <div class="wide" style="background:#faf8f5"><div class="dot" style="background:#faf8f5;border:1px solid #ddd"></div><div class="info"><span class="name">bg</span><span class="val">#faf8f5</span></div></div>
  <div class="wide" style="background:#f0eeeb"><div class="dot" style="background:#f0eeeb;border:1px solid #ddd"></div><div class="info"><span class="name">bg-section</span><span class="val">#f0eeeb</span></div></div>
  <div class="wide" style="background:#fff"><div class="dot" style="background:#fff;border:1px solid #ddd"></div><div class="info"><span class="name">bg-white / card</span><span class="val">#ffffff</span></div></div>
</div>
<h4>Foreground</h4>
<div class="row">
  <div class="wide"><div class="dot" style="background:#1a1a1a"></div><div class="info"><span class="name">fg-primary</span><span class="val">#1a1a1a</span></div></div>
  <div class="wide"><div class="dot" style="background:#6b7280"></div><div class="info"><span class="name">fg-secondary</span><span class="val">#6b7280</span></div></div>
  <div class="wide"><div class="dot" style="background:rgba(75,75,75,0.7)"></div><div class="info"><span class="name">fg-tertiary</span><span class="val">rgba(75,75,75,.7)</span></div></div>
</div>
<h4>Accent — Blue</h4>
<div class="grid">
  <div class="swatch"><div class="color" style="background:#2563eb"></div><div class="label"><div class="name">accent-dim</div><div class="val">#2563eb</div></div></div>
  <div class="swatch"><div class="color" style="background:#3b82f6"></div><div class="label"><div class="name">accent</div><div class="val">#3b82f6</div></div></div>
  <div class="swatch"><div class="color" style="background:#60a5fa"></div><div class="label"><div class="name">accent-light</div><div class="val">#60a5fa</div></div></div>
  <div class="swatch"><div class="color" style="background:#eff6ff;border-bottom:1px solid #dbeafe"></div><div class="label"><div class="name">accent-bg</div><div class="val">#eff6ff</div></div></div>
</div>
</body></html>
