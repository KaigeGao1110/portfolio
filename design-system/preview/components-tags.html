<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:var(--color-bg); font-family:var(--font-sans); padding:20px; }
  h4 { font-size:10px; font-weight:600; letter-spacing:0.15em; text-transform:uppercase; color:#6b7280; margin:0 0 8px; }
  .row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
  .stat { background:white;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:12px 16px;text-align:center;min-width:80px; }
  .stat .val { font-size:22px;font-weight:900;color:#3b82f6;display:block; }
  .stat .label { font-size:9px;font-weight:500;color:rgba(26,26,26,0.5);text-transform:uppercase;letter-spacing:0.1em; }
</style></head><body>
<h4>Tech Tags / Pills</h4>
<div class="row">
  <span class="kg-tag">Python</span>
  <span class="kg-tag">FastAPI</span>
  <span class="kg-tag">Cloud Run</span>
  <span class="kg-tag">Multi-Agent</span>
  <span class="kg-tag">GCP</span>
  <span class="kg-tag">LangGraph</span>
  <span class="kg-tag">Terraform</span>
  <span class="kg-tag">Claude Sonnet</span>
  <span class="kg-tag">AWS</span>
  <span class="kg-tag">Docker</span>
</div>
<h4>Eyebrow Labels</h4>
<div class="row">
  <span class="kg-eyebrow">About Me</span>
  <span class="kg-eyebrow" style="color:#6b7280;">Expertise</span>
  <span class="kg-eyebrow">Portfolio</span>
  <span class="kg-eyebrow">Contact</span>
</div>
<h4>Stat Cards</h4>
<div class="row">
  <div class="stat"><span class="val">4+</span><span class="label">Projects Shipped</span></div>
  <div class="stat"><span class="val">3</span><span class="label">Cloud Platforms</span></div>
  <div class="stat"><span class="val">1</span><span class="label">Goal: Founder</span></div>
</div>
<h4>Live Badge</h4>
<div class="row">
  <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#3b82f6;">
    <span style="width:7px;height:7px;border-radius:50%;background:#3b82f6;animation:pulse 1.5s infinite;display:inline-block;"></span>
    Live
  </span>
</div>
<style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}</style>
</body></html>
